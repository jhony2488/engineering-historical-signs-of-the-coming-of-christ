name: Motor Nível 3 — Disparo manual

on:
  workflow_dispatch:
    inputs:
      window:
        description: Janela híbrida (quarterly|semiannual|annual)
        required: true
        default: quarterly
        type: choice
        options:
          - quarterly
          - semiannual
          - annual
      run_synthesis:
        description: Executar síntese Nível 2 antes do híbrido
        required: true
        default: true
        type: boolean

defaults:
  run:
    working-directory: backend

jobs:
  hybrid:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Run synthesis (Nível 2)
        if: inputs.run_synthesis
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LLM_DRY_RUN: ${{ vars.LLM_DRY_RUN || 'false' }}
        run: python -m motor.cli run-synthesis --window ${{ inputs.window }}
      - name: Run hybrid analysis (Nível 3)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LLM_DRY_RUN: ${{ vars.LLM_DRY_RUN || 'false' }}
        run: python -m motor.cli run-hybrid-analysis --window ${{ inputs.window }}

name: Semiannual Synthesis — Motor Nível 2

on:
  schedule:
    # 1º de janeiro e 1º de julho, 09:15 UTC (~06:15 BRT)
    - cron: "15 9 1 1,7 *"
  workflow_dispatch:

defaults:
  run:
    working-directory: backend

jobs:
  synthesis:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Run semiannual synthesis
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LLM_DRY_RUN: ${{ vars.LLM_DRY_RUN || 'false' }}
        run: python -m motor.cli run-synthesis --window semiannual

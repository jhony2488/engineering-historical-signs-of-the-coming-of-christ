name: Quarterly Hybrid — Motor Nível 3

on:
  schedule:
    # Jan/Abr/Jul/Out dia 1, 10:45 UTC — após síntese trimestral (10:00)
    - cron: "45 10 1 1,4,7,10 *"
  workflow_dispatch:

defaults:
  run:
    working-directory: backend

jobs:
  hybrid:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Run quarterly hybrid analysis (Nível 3)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LLM_DRY_RUN: ${{ vars.LLM_DRY_RUN || 'false' }}
        run: python -m motor.cli run-hybrid-analysis --window quarterly

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: sinais
      POSTGRES_PASSWORD: sinais
      POSTGRES_DB: sinais
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../backend/supabase/migrations/20260604000001_init_schema.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sinais -d sinais"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: http://localhost:3000
        NEXT_PUBLIC_DATA_SOURCE: db
        NEXT_PUBLIC_USE_MOCK: "false"
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://sinais:sinais@postgres:5432/sinais
      DIRECT_URL: postgresql://sinais:sinais@postgres:5432/sinais
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_DATA_SOURCE: db
      NEXT_PUBLIC_API_URL: http://host.docker.internal:8000
      NEXT_PUBLIC_USE_MOCK: "false"
    depends_on:
      postgres:
        condition: service_healthy

  # Popula candidatos, histórico e snapshots de demo
  # Uso: docker compose --profile seed run --rm seed
  seed:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    profiles: [seed]
    environment:
      DATABASE_URL: postgresql://sinais:sinais@postgres:5432/sinais
      DIRECT_URL: postgresql://sinais:sinais@postgres:5432/sinais
    command: npx tsx prisma/seed.ts
    depends_on:
      postgres:
        condition: service_healthy

  # Desenvolvimento com hot-reload (sem rebuild da imagem de produção)
  # Uso: docker compose --profile dev up dev
  dev:
    image: node:22-alpine
    profiles: [dev]
    working_dir: /app
    volumes:
      - .:/app
      - dev_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://sinais:sinais@postgres:5432/sinais
      DIRECT_URL: postgresql://sinais:sinais@postgres:5432/sinais
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_DATA_SOURCE: db
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_USE_MOCK: "false"
    command: sh -c "apk add --no-cache libc6-compat openssl && npm ci && npx prisma generate && npm run dev"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  dev_node_modules:
